  <body>
    <div id="root"></div>
    <script>
      (function () {
        var redirect = window.location.search;
        if (!redirect || redirect.indexOf("/?") !== 0) {
          return;
        }

        var restoredPath = redirect
          .slice(2)
          .split("&")
          .map(function (part, index) {
            return index === 0 ? part.replace(/~and~/g, "&") : "?" + part.replace(/~and~/g, "&");
          })
          .join("");

        window.history.replaceState(null, "", "/" + restoredPath + window.location.hash);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
